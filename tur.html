<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanal Tur — BynAi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', system-ui, sans-serif; background:#1A1A16; color:#FAFAF8; height:100vh; overflow:hidden; }
    #viewer { width:100vw; height:100vh; }
    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:50;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 22px; background:linear-gradient(rgba(26,26,22,0.85), transparent);
      pointer-events:none;
    }
    .topbar > * { pointer-events:auto; }
    .brand { font-size:15px; font-weight:700; letter-spacing:0.5px; color:#FAFAF8; text-decoration:none; }
    .brand span { color:#C89B8C; }
    .title { font-size:13px; color:#D8D2C8; }
    .scenes {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:50;
      display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:92vw;
    }
    .scene-btn {
      padding:9px 18px; border:1px solid rgba(250,250,248,0.25); border-radius:24px;
      background:rgba(26,26,22,0.65); color:#FAFAF8; font-size:13px; cursor:pointer;
      backdrop-filter:blur(6px); transition:all 0.2s;
    }
    .scene-btn:hover { background:rgba(154,101,88,0.7); }
    .scene-btn.active { background:#9A6558; border-color:#9A6558; }
    .center-msg {
      position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:14px; text-align:center; padding:24px; z-index:60; background:#1A1A16;
    }
    .center-msg .icon { font-size:48px; }
    .center-msg h2 { font-size:20px; font-weight:600; }
    .center-msg p { font-size:14px; color:#ABA49C; max-width:420px; line-height:1.6; }
    .center-msg a {
      margin-top:8px; padding:12px 28px; background:#9A6558; color:#FAFAF8;
      border-radius:10px; text-decoration:none; font-size:14px; font-weight:600;
    }
    .logo-badge {
      max-height:44px; max-width:160px; border-radius:8px;
      background:rgba(250,250,248,0.9); padding:4px 8px; object-fit:contain;
    }
    .plan-mini {
      position:fixed; right:16px; bottom:16px; z-index:55;
      width:220px; max-width:38vw; border-radius:12px; overflow:hidden;
      border:1px solid rgba(250,250,248,0.3); box-shadow:0 4px 18px rgba(0,0,0,0.45);
      background:rgba(250,250,248,0.95);
    }
    .plan-mini img { width:100%; display:block; }
    .plan-dot {
      position:absolute; width:12px; height:12px; border-radius:50%;
      transform:translate(-50%,-50%); border:2px solid #fff;
      background:#7A8B6A; box-shadow:0 1px 4px rgba(0,0,0,0.4); cursor:pointer;
    }
    .plan-dot.active {
      background:#9A6558; width:16px; height:16px;
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow:0 0 0 0 rgba(154,101,88,0.5); }
      50% { box-shadow:0 0 0 7px rgba(154,101,88,0); }
    }
    /* sahne geçiş noktası — yuvarlak beyaz nokta */
    .spot-dot {
      width:18px; height:18px; border-radius:50%;
      background:#FFFFFF; cursor:pointer;
      animation:spotPulse 2s ease-in-out infinite;
    }
    @keyframes spotPulse {
      0%, 100% { box-shadow:0 0 0 5px rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.45); }
      50% { box-shadow:0 0 0 11px rgba(255,255,255,0.10), 0 2px 8px rgba(0,0,0,0.45); }
    }
    /* telefon boyutları — tüm overlay'ler ekrana oranlı küçülür */
    @media (max-width: 640px) {
      .topbar { padding:10px 14px; }
      .brand { font-size:13px; }
      .title { font-size:11px; max-width:38vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .logo-badge { max-height:30px; max-width:100px; }
      .scenes { bottom:12px; gap:6px; }
      .scene-btn { padding:7px 13px; font-size:11px; }
      .plan-mini { width:132px; bottom:62px; }
      .spot-dot { width:14px; height:14px; }
      .plan-dot { width:9px; height:9px; }
      .plan-dot.active { width:12px; height:12px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/">Render<span>AI</span></a>
  <div style="display:flex; align-items:center; gap:14px;">
    <div class="title" id="tourTitle"></div>
    <img id="logoBadge" class="logo-badge" style="display:none;" alt="logo" />
  </div>
</div>

<div id="viewer"></div>
<div class="scenes" id="sceneBtns"></div>
<div id="planMini" class="plan-mini" style="display:none; position:fixed;">
  <img id="planImg" alt="kat planı" />
</div>

<div class="center-msg" id="msgBox">
  <div class="icon">🌐</div>
  <h2 id="msgTitle">Tur yükleniyor...</h2>
  <p id="msgText"></p>
</div>

<script>
  const API = 'https://web-production-8c34d.up.railway.app';
  const tourId = new URLSearchParams(location.search).get('id');

  function showMsg(icon, title, text, withHome) {
    document.getElementById('msgBox').style.display = 'flex';
    document.querySelector('#msgBox .icon').textContent = icon;
    document.getElementById('msgTitle').textContent = title;
    document.getElementById('msgText').innerHTML = text;
    if (withHome) {
      const a = document.createElement('a');
      a.href = '/';
      a.textContent = 'BynAi ile kendi turunu oluştur';
      document.getElementById('msgBox').appendChild(a);
    }
  }

  async function loadTour() {
    if (!tourId) { showMsg('❓', 'Tur bulunamadı', 'Link eksik veya hatalı görünüyor.', true); return; }
    try {
      const res = await fetch(`${API}/tours/${tourId}`);
      if (!res.ok) { showMsg('❓', 'Tur bulunamadı', 'Bu link geçersiz veya tur silinmiş olabilir.', true); return; }
      const tour = await res.json();

      if (tour.expired) {
        showMsg('⏳', 'Bu turun süresi doldu',
          'Turun yayın süresi sona ermiş. Tur sahibiyseniz üyeliğinizi aktifleştirdiğinizde link tekrar çalışır (1 ay içinde).', true);
        return;
      }

      const panos = tour.panoramas || [];
      if (!panos.length) { showMsg('❓', 'Tur boş', 'Bu turda henüz panorama yok.', true); return; }

      document.getElementById('tourTitle').textContent = tour.title || '';
      document.getElementById('msgBox').style.display = 'none';

      // pano id → sahne id eşlemesi (hotspot hedefleri için)
      const idToScene = {};
      panos.forEach((p, i) => { if (p.id) idToScene[p.id] = 's' + i; });

      const scenes = {};
      panos.forEach((p, i) => {
        const s = {
          type: 'equirectangular', panorama: p.url, autoLoad: true,
          hotSpots: (p.hotspots || []).filter(h => idToScene[h.target]).map(h => ({
            pitch: h.pitch, yaw: h.yaw, type: 'scene',
            text: h.targetLabel || '', sceneId: idToScene[h.target],
            cssClass: 'spot-dot'
          }))
        };
        // editörde kaydedilen açılış açısı
        if (p.initYaw != null) s.yaw = p.initYaw;
        if (p.initPitch != null) s.pitch = p.initPitch;
        if (p.initHfov != null) s.hfov = p.initHfov;
        scenes['s' + i] = s;
      });

      const v = pannellum.viewer('viewer', {
        default: { firstScene: 's0', autoLoad: true, autoRotate: -3, sceneFadeDuration: 800 },
        scenes
      });

      // firma logosu — sağ üst köşe
      const meta = tour.meta || {};
      if (meta.logo_url) {
        const logo = document.getElementById('logoBadge');
        logo.src = meta.logo_url;
        logo.style.display = 'block';
      }

      // kat planı minimap — sağ alt köşe, aktif oda işaretli
      const planMini = document.getElementById('planMini');
      if (meta.plan_url) {
        document.getElementById('planImg').src = meta.plan_url;
        planMini.style.display = 'block';
        panos.forEach((p, i) => {
          if (p.planX == null || p.planY == null) return;
          const dot = document.createElement('div');
          dot.className = 'plan-dot' + (i === 0 ? ' active' : '');
          dot.dataset.scene = 's' + i;
          dot.style.left = p.planX + '%';
          dot.style.top = p.planY + '%';
          dot.title = p.label || '';
          dot.onclick = () => v.loadScene('s' + i);
          planMini.appendChild(dot);
        });
      }

      function setActive(sceneId) {
        document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === sceneId));
        document.querySelectorAll('.plan-dot').forEach(d => d.classList.toggle('active', d.dataset.scene === sceneId));
      }
      v.on('scenechange', sceneId => setActive(sceneId));

      if (panos.length > 1) {
        const wrap = document.getElementById('sceneBtns');
        panos.forEach((p, i) => {
          const b = document.createElement('button');
          b.className = 'scene-btn' + (i === 0 ? ' active' : '');
          b.dataset.scene = 's' + i;
          b.textContent = p.label || ('Sahne ' + (i + 1));
          b.onclick = () => v.loadScene('s' + i);
          wrap.appendChild(b);
        });
      }
    } catch (e) {
      showMsg('⚠️', 'Bağlantı hatası', 'Tur şu anda yüklenemiyor — birkaç saniye sonra sayfayı yenileyin.', false);
    }
  }

  loadTour();
</script>

</body>
</html>
