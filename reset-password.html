<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Şifre Sıfırla · BynAi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%239A6558'/%3E%3Ctext%20x='16'%20y='23'%20font-family='Arial'%20font-size='19'%20font-weight='bold'%20fill='%23FAFAF8'%20text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<style>
  body { background:#E8E4DC; color:#2A2520; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
  .card { background:#FAFAF8; border-radius:18px; padding:32px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.12); }
  h1 { font-size:18px; margin:0 0 18px; color:#2A2520; }
  input { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid #D8D2C8; border-radius:10px; background:#fff;
          font-size:14px; margin-bottom:10px; color:#2A2520; }
  button { width:100%; padding:13px; border:none; border-radius:10px; background:#9A6558; color:#FAFAF8; font-size:14px;
           font-weight:700; cursor:pointer; margin-top:4px; }
  button:disabled { opacity:0.6; cursor:default; }
  .msg { font-size:13px; margin-bottom:12px; display:none; }
  .msg.err { color:#B5483A; }
  .msg.ok { color:#7A8B6A; }
  a { color:#9A6558; font-size:13px; }
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Yeni Şifre Belirle</h1>
  <div id="formBox">
    <input id="p1" type="password" placeholder="Yeni şifre (en az 6 karakter)" autocomplete="new-password" />
    <input id="p2" type="password" placeholder="Yeni şifre (tekrar)" autocomplete="new-password" />
    <div id="msg" class="msg"></div>
    <button id="submitBtn" onclick="submitReset()">Şifreyi Kaydet</button>
  </div>
  <div id="doneBox" style="display:none;">
    <div class="msg ok" style="display:block;">Şifren güncellendi ✓ Şimdi giriş yapabilirsin.</div>
    <a href="index.html">← Ana sayfaya dön ve giriş yap</a>
  </div>
  <div id="invalidBox" style="display:none;">
    <div class="msg err" style="display:block;">Bu link geçersiz veya süresi dolmuş. Hesabım'dan tekrar "Şifremi unuttum?" ile yeni bir link iste.</div>
    <a href="index.html">← Ana sayfaya dön</a>
  </div>
</div>
<script>
  const API = 'https://web-production-8c34d.up.railway.app';

  function getAccessToken() {
    const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
    const params = new URLSearchParams(hash);
    return params.get('access_token') || '';
  }

  const accessToken = getAccessToken();
  if (accessToken) {
    // Token'ı adres çubuğunda bırakmamak için temizle
    history.replaceState(null, '', window.location.pathname);
  } else {
    document.getElementById('formBox').style.display = 'none';
    document.getElementById('invalidBox').style.display = 'block';
  }

  async function submitReset() {
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    const msg = document.getElementById('msg');
    const show = (txt, cls) => { msg.textContent = txt; msg.className = 'msg ' + cls; msg.style.display = 'block'; };
    if (p1.length < 6) { show('Şifre en az 6 karakter olmalı.', 'err'); return; }
    if (p1 !== p2) { show('Şifreler eşleşmiyor.', 'err'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
      const r = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
        body: JSON.stringify({ password: p1 })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Şifre değiştirilemedi');
      document.getElementById('formBox').style.display = 'none';
      document.getElementById('doneBox').style.display = 'block';
    } catch (e) {
      show('Hata: ' + e.message, 'err');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
